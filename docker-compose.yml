version: '3.8'

services:
  app:
    build: .                               # Build from the current directory
    ports:
      - "3000:3000"                        # Maps port 3000 on host to port 3000 in the container
    depends_on:
      - db                                 # Ensures the db service starts before the app
    environment:
      - DB_HOST=db                          # Set the DB host to the service name (changed from mariadb)
      - DB_USER=root                       # Database user
      - DB_PASSWORD=MySecureP@ss1          # Database password
      - DB_NAME=social_app                  # Database name
    volumes:
      - .:/usr/src/app                     # Mount the current directory to the container
    networks:
      - my-network                          # Connect to the specified network

  db:
    image: mariadb:latest                  # Use the latest MariaDB image
    restart: always                         # Restart the container if it stops
    environment:
      MYSQL_ROOT_PASSWORD: MySecureP@ss1   # Set the root password for MariaDB
      MYSQL_DATABASE: social_app            # Automatically create the database
      MYSQL_USER: root                      # Use 'root' user
      MYSQL_PASSWORD: MySecureP@ss1         # Set password for 'root'
    ports:
      - "3306:3306"                         # Maps port 3306 on host to port 3306 in the container
    networks:
      - my-network                          # Connect to the specified network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  my-network:                              # Define the custom network
